<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Prince Jewelries Plug</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

💎 PRINCE JEWELRIES PLUG ADMIN

</div>

</header>

<section class="dashboard-stats">

<div class="product-card">
<h3>Total Products</h3>
<h1 id="totalProducts">0</h1>
</div>

<div class="product-card">
<h3>Total Orders</h3>
<h1 id="totalOrders">0</h1>
</div>

<div class="product-card">
<h3>Total Revenue</h3>
<h1 id="totalRevenue">₦0</h1>
</div>

<div class="product-card">
<h3>Delivered Orders</h3>
<h1 id="deliveredOrders">0</h1>
</div>

<div class="product-card">
<h3>Pending Orders</h3>
<h1 id="pendingOrders">0</h1>
</div>

</section>

<section class="products" style="margin-top:120px;">

<h2>Upload New Product</h2>

<input type="text" id="productName" placeholder="Product Name">

<br><br>

<input type="number" id="productPrice" placeholder="Product Price">

<br><br>

<input type="number" id="oldPrice" placeholder="Old Price">

<br><br>

<input type="number" id="productQuantity" placeholder="Quantity Available">

<br><br>

<input type="text" id="productCategory" placeholder="Category">

<br><br>

<textarea id="productDescription" placeholder="Product Description"></textarea>

<br><br>

<input type="text" id="productImage" placeholder="Paste Product Image URL">

<br><br>

<button class="shop-btn" id="uploadBtn">

Upload Product

</button>

</section>

<section class="products">

<h2>Uploaded Products</h2>

<div id="adminProducts"></div>

</section>


</section>

<section class="products">

<h2>Uploaded Products</h2>

<div id="adminProducts"></div>

</section>






</body>

</html>
